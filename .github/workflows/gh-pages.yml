name: GH Pages
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["docs/**"]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: true
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - name: Build
        run: |
          pushd docs
          pnpm install
          pnpm run build
          popd
      - run: |
          curl https://api.github.com/repos/vic/den/releases | jq 'map(.tag_name) + ["main","latest"]' | tee docs/dist/versions.json
      - uses: actions/download-artifact@v8
        with:
          pattern: "docs-*"
          path: "./docs/dist"
          merge-multiple: true
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./docs/dist"
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
