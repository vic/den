name: Docs
on:
  push:
    branches: ["!main"]
    paths: ["docs/**"]
  pull_request:
    types: [labeled, opened, synchronize, reopened, review_requested, ready_for_review]
    paths: ["docs/**"]
  pull_request_review:
    types: [submitted]
concurrency:
  group: "docs"
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - name: Build
        run: |
          pushd docs
          pnpm install
          pnpm run build
