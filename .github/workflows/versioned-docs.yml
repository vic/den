name: Versioned docs
on:
  workflow_dispatch:
  push:
    tags:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.number }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - name: Build
        run: |
          pushd docs
          pnpm install
          pnpm run build
          rg '(src|href)="/' dist -l -0 | xargs -0 -n 1 sed -i 's#\(src\|href\)="/#\1="/${{github.ref}}/#g'
          mkdir -p versioned
          mv dist versioned/${{github.ref}}
          popd
      - uses: actions/upload-artifact@v4
        with:
          name: docs-${{github.ref}}
          path: ./docs/versioned
          overwrite: true
        
